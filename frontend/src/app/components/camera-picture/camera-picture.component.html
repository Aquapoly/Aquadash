<div class="camera-wrapper">
    <div class="camera-frame">
        @if (displayedObjectUrl) {
            <img
                class="camera-image"
                [src]="displayedObjectUrl"
                alt="Image capturée par la caméra"
            />
        } @else {
            <div class="camera-placeholder" aria-hidden="true"></div>
        }

        @if (!isCameraAvailable) {
            <div class="camera-overlay">
                <div class="overlay-center">
                    <img src="/assets/camera_unavailable.png" alt="Caméra indisponible" />
                </div>
            </div>
        }
    </div>
</div>
