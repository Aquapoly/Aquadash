<div class="relative inline-block w-full">
  <button
    type="button"
    (click)="toggleDropdown()"
    class="w-full px-4 py-2.5 text-left bg-base-100 border border-base-300 rounded-lg shadow-sm hover:bg-base-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent flex items-center justify-between"
    [class.ring-2]="isOpen"
    [class.ring-blue-500]="isOpen"
  >
    <span class="block truncate text-base-700">
      {{ selectedOption?.label }}
    </span>
    <svg
      class="w-5 h-5 ml-2 transition-transform text-base-400"
      [class.rotate-180]="isOpen"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 9l-7 7-7-7"
      />
    </svg>
  </button>

  @if (isOpen) {
    <div
      class="absolute z-10 w-full mt-1 bg-base-100 border border-base-200 rounded-lg shadow-lg max-h-60 overflow-auto"
    >
      <ul class="py-1">
        @for (option of options; track option.value) {
          <li
            (click)="selectOption(option)"
            class="px-4 py-2.5 cursor-pointer transition-colors"
            [ngClass]="{
              'bg-primary text-gray-100': isSelected(option),
              'hover:bg-base-200 hover:text-base-700': !isSelected(option)
            }"
          >
            <div class="flex items-center justify-between">
              <span>{{ option.label }}</span>
              @if (isSelected(option)) {
                <svg
                  class="w-5 h-5 text-gray-100"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  />
                </svg>
              }
            </div>
          </li>
        }
      </ul>
    </div>
  }
</div>
