version: '3.1'

services:
  db:
    image: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: db
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_PASSWORD: aquapoly
      POSTGRES_DB: aquapoly
    restart: always
    ports:
      - "5432:5432"
    expose:
      - "5432"
    networks:
      - postgres
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:Z

  app:
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    build:
      context: .
      dockerfile: app.Dockerfile
    environment:
      DOCKER: 1
    privileged: true
    volumes:
      - .:/usr/src/app:Z
      - /dev:/dev
    restart: always
    depends_on:
      db:
        condition: service_healthy
    links:
      - db:db
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - postgres

networks:
  postgres:
    driver: bridge