services:
  db:
    image: postgres:18
    container_name: db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aquapoly
      POSTGRES_DB: aquapoly

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:Z

    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: app.Dockerfile

    container_name: backend-app

    stdin_open: true
    tty: true
    restart: always

    environment:
      DOCKER: 1
      CAMERA_NAME: ${CAMERA_NAME:-}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: aquapoly
      DB_NAME: aquapoly

    volumes:
      - .:/usr/src/app:Z
      - /run/camera:/run/camera:z

    user: "1000:${HOST_DEV_GID}"

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    networks:
      - backend


networks:
  backend:
    driver: bridge